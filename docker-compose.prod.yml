services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acquisitions-app-prod
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      ENV_FILE: .env.production
      USE_NEON_LOCAL: 'false'
    ports:
      - '3000:3000'
    command: npm run start
    restart: unless-stopped
