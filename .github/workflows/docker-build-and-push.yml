name: Docker Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      IMAGE_NAME: docker.io/${{ secrets.DOCKER_USERNAME }}/acquisitions-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=prod-{{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish Docker summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const imageName = '${{ env.IMAGE_NAME }}';
            const tags = `${{ steps.meta.outputs.tags }}`.split('\n').filter(Boolean);

            await core.summary
              .addHeading('Docker Publish Summary')
              .addRaw(`Image: ${imageName}`, true)
              .addRaw('', true)
              .addHeading('Published Tags', 3)
              .addList(tags)
              .write();
