name: Lint and Format

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Run Prettier check
        id: format
        continue-on-error: true
        run: npm run format:check

      - name: Annotate lint and format issues
        if: steps.lint.outcome == 'failure' || steps.format.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const lintFailed = '${{ steps.lint.outcome }}' === 'failure';
            const formatFailed = '${{ steps.format.outcome }}' === 'failure';

            if (lintFailed) {
              core.error('ESLint found issues. Suggested fix: run npm run lint:fix locally and commit the changes.');
            }
            if (formatFailed) {
              core.error('Prettier found formatting issues. Suggested fix: run npm run format locally and commit the changes.');
            }

      - name: Fail if checks failed
        if: steps.lint.outcome == 'failure' || steps.format.outcome == 'failure'
        run: |
          echo "Lint or format checks failed."
          exit 1
