name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: postgres://test:test@localhost:5432/test_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: run-tests
        continue-on-error: true
        run: npm test -- --json --outputFile=test-results.json

      - name: Add test annotations
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'test-results.json';
            if (!fs.existsSync(path)) {
              core.warning('No test-results.json found.');
              return;
            }

            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            const suites = results.testResults || [];
            let annotations = 0;

            for (const suite of suites) {
              for (const assertion of suite.assertionResults || []) {
                if (assertion.status !== 'failed') {
                  continue;
                }

                const title = [...(assertion.ancestorTitles || []), assertion.title].join(' > ');
                const message = (assertion.failureMessages || ['Test failed']).join('\n\n');
                core.error(message, { title: `Test failure: ${title}` });
                annotations += 1;

                if (annotations >= 50) {
                  core.warning('Too many failures; annotation output capped at 50.');
                  return;
                }
              }
            }

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage
            test-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish test summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'test-results.json';

            if (!fs.existsSync(path)) {
              await core.summary
                .addHeading('Test Summary')
                .addRaw('No test results file found.', true)
                .write();
              return;
            }

            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            const passed = results.numPassedTests ?? 0;
            const failed = results.numFailedTests ?? 0;
            const total = results.numTotalTests ?? 0;
            const suitesFailed = results.numFailedTestSuites ?? 0;
            const suitesTotal = results.numTotalTestSuites ?? 0;
            const coverageExists = fs.existsSync('coverage');

            await core.summary
              .addHeading('Test Summary')
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Total Tests', String(total)],
                ['Passed Tests', String(passed)],
                ['Failed Tests', String(failed)],
                ['Total Suites', String(suitesTotal)],
                ['Failed Suites', String(suitesFailed)],
                ['Coverage Directory Found', coverageExists ? 'Yes' : 'No']
              ])
              .write();

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "Tests failed. Review annotations and summary above."
          exit 1
